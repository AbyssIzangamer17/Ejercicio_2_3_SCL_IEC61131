<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>AI SCL Architect - Siemens Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --p: #c084fc;
            --bg: #050510;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wrap {
            width: 900px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .prompt-area {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            outline: none;
        }

        button {
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            background: #6366f1;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 15px;
            color: #4ade80;
            font-family: 'JetBrains Mono';
            padding: 20px;
            font-size: 14px;
            margin: 10px 0;
        }

        .valid {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #4ade80;
            padding: 15px;
            border-radius: 12px;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>SCL AI Architect <span style="font-weight: 300; font-size: 0.5em; color: #aaa;">TIA Design System</span>
        </h1>
        <p>Introduce una descripción y la IA generará el bloque de código SCL estructurado.</p>
        <div class="prompt-area">
            <input type="text" id="prompt" placeholder="Ej: Generar una FB para control de bomba con enclavamiento">
            <button onclick="ai()">Generar Bloque</button>
        </div>
        <textarea id="code" placeholder="// Código SCL generado aparecerá aquí..."></textarea>
        <button style="width: 100%; background: #22c55e;" onclick="val()">Validar para TIA Portal</button>
        <div id="vBox" class="valid">✓ ESTRUCTURA VÁLIDA: El código cumple con el estándar IEC 61131-3.</div>
    </div>
    <script>
        function ai() {
            const p = document.getElementById('prompt').value;
            const c = document.getElementById('code');
            c.value = `// ARCHITECT GEN: ${p}\nFUNCTION_BLOCK "Custom_Logic"\nVAR_INPUT\n  Start : BOOL;\n  Safety : BOOL;\nEND_VAR\nVAR_OUTPUT\n  Output : BOOL;\nEND_VAR\nBEGIN\n  // Lógica para: ${p}\n  IF #Start AND #Safety THEN\n    #Output := TRUE;\n  END_IF;\nEND_FUNCTION_BLOCK;`;
        }
        function val() { document.getElementById('vBox').style.display = 'block'; }
    </script>
</body>

</html>
