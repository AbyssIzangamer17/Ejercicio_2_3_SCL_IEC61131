<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCL Industrial Validator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 800px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 600;
            margin-bottom: 24px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: #94a3b8;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #4ade80; }
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SCL Code Validator (IEC 61131-3)</h1>
        <p>Introduce tu código SCL para validación estructural e integridad industrial.</p>
        <textarea id="sclCode" placeholder="VAR
  temp : INT;
END_VAR

temp := 10;"></textarea>
        <button onclick="validateCode()">Validar Programa</button>
        <div id="status"></div>
    </div>

    <script>
        async function validateCode() {
            const code = document.getElementById('sclCode').value;
            const statusDiv = document.getElementById('status');
            
            try {
                // Simulación de fetch al backend (puerto 3001)
                // En un entorno real: const response = await fetch('http://localhost:3001/validate', ...)
                
                const isValid = code.toLowerCase().includes('var') && code.toLowerCase().includes('end_var') && code.trim().endsWith(';');
                
                statusDiv.style.display = 'block';
                if(isValid) {
                    statusDiv.className = 'success';
                    statusDiv.innerText = '✓ Verificación Exitosa: Código cumple con el estándar IEC 61131-3.';
                } else {
                    statusDiv.className = 'error';
                    statusDiv.innerText = '✗ Error de Sintaxis: Se requiere bloque VAR/END_VAR y cierre con punto y coma.';
                }
            } catch (err) {
                statusDiv.innerText = 'Error al conectar con el servidor de validación.';
            }
        }
    </script>
</body>
</html>
