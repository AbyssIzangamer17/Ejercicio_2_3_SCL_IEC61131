<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SCL AI Generator & Validator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #6366f1;
            --bg: #0f172a;
            --g: rgba(255, 255, 255, 0.05);
            --b: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 900px;
            padding: 40px;
            background: var(--g);
            backdrop-filter: blur(15px);
            border: 1px solid var(--b);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
        }

        textarea {
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--b);
            border-radius: 12px;
            padding: 15px;
            color: #4ade80;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            outline: none;
            margin: 15px 0;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--b);
            color: white;
            border-radius: 10px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-gen {
            background: var(--p);
            color: white;
        }

        .btn-val {
            background: #10b981;
            color: white;
            width: 100%;
        }

        #status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            border: 1px solid transparent;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border-color: #10b981;
            color: #34d399;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>AI SCL Architect</h1>
        <p>Describe en lenguaje natural qué quieres programar (ej: "un contador de botellas hasta 100")</p>

        <div class="controls">
            <input type="text" id="prompt" placeholder="Describe tu lógica industrial aquí...">
            <button class="btn-gen" onclick="aiGenerate()">Generar con IA</button>
        </div>

        <textarea id="code" placeholder="// El código SCL aparecerá aquí..."></textarea>
        <button class="btn-val" onclick="validate()">Validar Código Industrial</button>
        <div id="status"></div>
    </div>

    <script>
        function aiGenerate() {
            const p = document.getElementById('prompt').value.toLowerCase();
            const area = document.getElementById('code');
            let code = `// Generado para: ${p}\nFUNCTION_BLOCK "AI_Generated_Logic"\nVAR_INPUT\n  Execute : BOOL;\nEND_VAR\nVAR\n  State : INT := 0;\nEND_VAR\nBEGIN\n`;

            if (p.includes('contador') || p.includes('cuenta')) {
                code += `  IF #Execute THEN\n    #State := #State + 1;\n  END_IF;\n`;
            } else if (p.includes('alarma') || p.includes('seguridad')) {
                code += `  IF NOT #Execute THEN\n    #State := 1; // ALARM STATE\n  END_IF;\n`;
            } else {
                code += `  // Lógica personalizada aplicada a: ${p}\n  IF #Execute THEN\n    #State := 100;\n  END_IF;\n`;
            }

            code += `END_FUNCTION_BLOCK;`;
            area.value = code;
        }

        function validate() {
            const s = document.getElementById('status');
            const c = document.getElementById('code').value;
            s.style.display = 'block';
            if (c.includes('FUNCTION_BLOCK') && c.includes('END_FUNCTION_BLOCK')) {
                s.className = 'success';
                s.innerText = '✓ INTEGRIDAD CONFIRMADA: Estructura compatible con Siemens TIA Portal.';
            } else {
                s.className = 'error';
                s.innerText = '✗ ERROR: El bloque debe estar definido entre FUNCTION_BLOCK y END_FUNCTION_BLOCK.';
            }
        }
    </script>
</body>

</html>
